<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Lumina Gallery | Responsive Image Gallery with Lightbox & Filters</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #f7f9fc 0%, #eef2f5 100%);
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 2rem 1.5rem;
            color: #1a2c3e;
        }

        /* main container */
        .gallery-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* header & title */
        .gallery-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .gallery-header h1 {
            font-size: 2.6rem;
            font-weight: 600;
            background: linear-gradient(135deg, #1f3b4c, #2c5a6e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .gallery-header p {
            color: #4a627a;
            margin-top: 0.5rem;
            font-weight: 400;
        }

        /* ----- FILTER / CATEGORY BUTTONS (BONUS) ----- */
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 2.5rem;
        }

        .filter-btn {
            background: #ffffffcc;
            backdrop-filter: blur(2px);
            border: 1px solid #cbdde6;
            padding: 0.6rem 1.5rem;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.25s ease;
            color: #1f3b4c;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
        }

        .filter-btn:hover {
            background: #e6f0f5;
            border-color: #7f9eb5;
            transform: translateY(-2px);
        }

        .filter-btn.active {
            background: #2c5a6e;
            border-color: #2c5a6e;
            color: white;
            box-shadow: 0 6px 12px rgba(44, 90, 110, 0.2);
        }

        /* ----- GALLERY GRID (CSS LAYOUT + HOVER EFFECTS) ----- */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.8rem;
            margin-bottom: 2.5rem;
            transition: all 0.2s;
        }

        /* gallery item */
        .gallery-item {
            position: relative;
            border-radius: 24px;
            overflow: hidden;
            background: #fff;
            box-shadow: 0 12px 24px -12px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1), box-shadow 0.3s ease;
            aspect-ratio: 1 / 1;
        }

        .gallery-item:hover {
            transform: scale(1.02);
            box-shadow: 0 25px 35px -16px rgba(0, 0, 0, 0.3);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease, filter 0.4s;
        }

        /* hover scale effect + subtle brightness */
        .gallery-item:hover img {
            transform: scale(1.05);
            filter: brightness(1.02) contrast(1.03);
        }

        /* overlay with category tag */
        .item-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.7), transparent);
            padding: 1rem 0.8rem 0.8rem;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .gallery-item:hover .item-overlay {
            opacity: 1;
        }

        .category-badge {
            background: rgba(44, 90, 110, 0.9);
            backdrop-filter: blur(4px);
            display: inline-block;
            padding: 0.25rem 0.9rem;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            color: white;
            letter-spacing: 0.3px;
        }

        /* ----- NAVIGATION (prev/next + page info) ----- */
        .nav-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            margin: 2rem 0 2rem;
        }

        .nav-btn {
            background: #ffffffdd;
            backdrop-filter: blur(4px);
            border: 1px solid #bdd3e0;
            font-size: 1.4rem;
            font-weight: bold;
            padding: 0.65rem 1.5rem;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #1f3b4c;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
        }

        .nav-btn:hover {
            background: #ffffff;
            border-color: #2c5a6e;
            transform: scale(0.98);
            box-shadow: 0 5px 12px rgba(0, 0, 0, 0.1);
        }

        .page-indicator {
            background: #eaf1f6;
            padding: 0.55rem 1.4rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            color: #1f3b4c;
            letter-spacing: 0.3px;
        }

        /* ----- LIGHTBOX (MODAL) ----- */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 20, 28, 0.94);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            transition: opacity 0.2s;
        }

        .lightbox.active {
            display: flex;
            animation: fadeIn 0.25s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .lightbox-content {
            max-width: 90vw;
            max-height: 85vh;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .lightbox-img {
            max-width: 90vw;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            transition: transform 0.2s;
        }

        .close-lightbox {
            position: absolute;
            top: 20px;
            right: 35px;
            font-size: 3rem;
            color: white;
            cursor: pointer;
            background: none;
            border: none;
            font-weight: 300;
            transition: 0.2s;
            z-index: 1002;
        }

        .close-lightbox:hover {
            color: #ffb347;
            transform: scale(1.1);
        }

        .lightbox-nav {
            display: flex;
            gap: 1.8rem;
            margin-top: 1.5rem;
        }

        .lb-nav-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            font-size: 2rem;
            padding: 0.5rem 1.2rem;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: all 0.2s;
        }

        .lb-nav-btn:hover {
            background: rgba(44, 90, 110, 0.9);
            transform: scale(1.03);
        }

        .lightbox-caption {
            margin-top: 1rem;
            color: #f0f3f5;
            background: rgba(0, 0, 0, 0.6);
            padding: 0.5rem 1.2rem;
            border-radius: 60px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* responsive adjustments */
        @media (max-width: 680px) {
            body {
                padding: 1.2rem;
            }

            .gallery-header h1 {
                font-size: 2rem;
            }

            .filter-btn {
                padding: 0.4rem 1rem;
                font-size: 0.75rem;
            }

            .nav-btn {
                padding: 0.45rem 1.2rem;
                font-size: 1rem;
            }

            .gallery-grid {
                gap: 1rem;
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            }
        }

        /* no results / empty state */
        .empty-message {
            text-align: center;
            padding: 3rem;
            font-size: 1.2rem;
            background: #f1f5f9;
            border-radius: 48px;
            color: #4b6b84;
            grid-column: 1 / -1;
        }

        footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #6b8aa3;
            border-top: 1px solid #cbdde6;
            padding-top: 2rem;
        }
    </style>
</head>

<body>

    <div class="gallery-container">
        <div class="gallery-header">
            <h1>✨ Lumina Gallery</h1>
            <p>Hover effects · smooth lightbox · categories & filters</p>
        </div>

        <!-- FILTER / CATEGORIES (BONUS) -->
        <div class="filter-bar" id="filterBar">
            <button class="filter-btn active" data-filter="all">🌿 All</button>
            <button class="filter-btn" data-filter="nature">🏞️ Nature</button>
            <button class="filter-btn" data-filter="city">🌆 City</button>
            <button class="filter-btn" data-filter="abstract">🎨 Abstract</button>
            <button class="filter-btn" data-filter="people">🧑‍🤝‍🧑 People</button>
        </div>

        <!-- GALLERY GRID (dynamic JS) -->
        <div id="galleryGrid" class="gallery-grid"></div>

        <!-- PREV / NEXT BUTTONS (page navigation) -->
        <div class="nav-controls">
            <button class="nav-btn" id="prevPageBtn">◀ Prev</button>
            <span class="page-indicator" id="pageIndicator">Page 1</span>
            <button class="nav-btn" id="nextPageBtn">Next ▶</button>
        </div>
        <footer>⭐ Click any image for lightbox | Smooth transitions + responsive grid</footer>
    </div>

    <!-- LIGHTBOX MODAL -->
    <div id="lightboxModal" class="lightbox">
        <button class="close-lightbox" id="closeLightboxBtn">&times;</button>
        <div class="lightbox-content">
            <img class="lightbox-img" id="lightboxImg" alt="Lightbox view">
        </div>
        <div class="lightbox-nav">
            <button class="lb-nav-btn" id="lbPrevBtn">◀ Prev</button>
            <button class="lb-nav-btn" id="lbNextBtn">Next ▶</button>
        </div>
        <div class="lightbox-caption" id="lightboxCaption"></div>
    </div>

    <script>
        // ---------- IMAGE DATASET (with categories to demonstrate filters & categories bonus) ----------
        const allImages = [
            { id: 1, src: "https://picsum.photos/id/104/500/500", category: "nature", title: "Misty Highlands", alt: "Nature landscape with hills" },
            { id: 2, src: "https://picsum.photos/id/15/500/500", category: "nature", title: "Forest Canopy", alt: "Green forest leaves" },
            { id: 3, src: "https://picsum.photos/id/96/500/500", category: "city", title: "Urban Twilight", alt: "City skyscrapers at night" },
            { id: 4, src: "https://picsum.photos/id/20/500/500", category: "abstract", title: "Dreamy Motion", alt: "Abstract blur waves" },
            { id: 5, src: "https://picsum.photos/id/26/500/500", category: "people", title: "Venice Stroll", alt: "Couple walking near water" },
            { id: 6, src: "https://picsum.photos/id/29/500/500", category: "city", title: "Neon Streets", alt: "Busy city street" },
            { id: 7, src: "https://picsum.photos/id/42/500/500", category: "nature", title: "Mountain Lake", alt: "Crystal lake and peaks" },
            { id: 8, src: "https://picsum.photos/id/48/500/500", category: "abstract", title: "Golden Flow", alt: "Golden textured abstract" },
            { id: 9, src: "https://picsum.photos/id/64/500/500", category: "people", title: "Cafe Moments", alt: "Person reading at cafe" },
            { id: 10, src: "https://picsum.photos/id/66/500/500", category: "nature", title: "Bamboo Forest", alt: "Sunlight through bamboo" },
            { id: 11, src: "https://picsum.photos/id/91/500/500", category: "city", title: "Night Lights", alt: "Illuminated buildings" },
            { id: 12, src: "https://picsum.photos/id/169/500/500", category: "abstract", title: "Sunset Prism", alt: "Colorful reflection" },
            { id: 13, src: "https://picsum.photos/id/155/500/500", category: "people", title: "Market Joy", alt: "Smiling vendor" },
            { id: 14, src: "https://picsum.photos/id/29/500/500", category: "city", title: "Metropolis Rush", alt: "City traffic" },
            { id: 15, src: "https://picsum.photos/id/45/500/500", category: "nature", title: "Waterfall Serenity", alt: "Cascading water" }
        ];

        // ---------- pagination & filter state ----------
        let currentFilter = "all";      // active filter category
        let currentPage = 1;
        const itemsPerPage = 6;         // 6 images per page for clean grid

        // filtered version of images based on currentFilter
        function getFilteredImages() {
            if (currentFilter === "all") return [...allImages];
            return allImages.filter(img => img.category === currentFilter);
        }

        // get paginated slice of current filtered array
        function getPaginatedItems() {
            const filtered = getFilteredImages();
            const startIdx = (currentPage - 1) * itemsPerPage;
            const endIdx = startIdx + itemsPerPage;
            return filtered.slice(startIdx, endIdx);
        }

        // total pages helper
        function getTotalPages() {
            const filteredLength = getFilteredImages().length;
            return Math.ceil(filteredLength / itemsPerPage);
        }

        // adjust page if out of bounds after filter change
        function clampPage() {
            const total = getTotalPages();
            if (total === 0) currentPage = 1;
            else if (currentPage > total) currentPage = total;
            if (currentPage < 1) currentPage = 1;
        }

        // render gallery grid (dynamic HTML, hover effects automatically via CSS)
        function renderGallery() {
            const gridContainer = document.getElementById("galleryGrid");
            const paginatedItems = getPaginatedItems();
            const totalFiltered = getFilteredImages().length;

            if (paginatedItems.length === 0) {
                gridContainer.innerHTML = `<div class="empty-message">✨ No images in this category. Try another filter! ✨</div>`;
                document.getElementById("pageIndicator").innerText = `Page 0 / 0`;
                return;
            }

            let gridHtml = "";
            for (let img of paginatedItems) {
                // Each gallery-item includes data-id to open lightbox with correct image context.
                // Add overlay with category badge (bonus categories visible on hover)
                gridHtml += `
        <div class="gallery-item" data-id="${img.id}" data-category="${img.category}" data-src="${img.src}" data-title="${img.title}" data-alt="${img.alt}">
          <img src="${img.src}" alt="${img.alt}" loading="lazy">
          <div class="item-overlay">
            <span class="category-badge">${img.category.toUpperCase()}</span>
          </div>
        </div>
      `;
            }
            gridContainer.innerHTML = gridHtml;

            // update page indicator
            const totalPages = getTotalPages();
            document.getElementById("pageIndicator").innerText = `Page ${currentPage} of ${totalPages || 1}`;

            // disable prev/next if needed (visual not needed but functional)
            const prevBtn = document.getElementById("prevPageBtn");
            const nextBtn = document.getElementById("nextPageBtn");
            if (prevBtn && nextBtn) {
                // just style doesn't block but logic prevents action
            }
        }

        // attach lightbox listeners to each gallery item after render (event delegation)
        function bindLightboxEvents() {
            const items = document.querySelectorAll(".gallery-item");
            items.forEach(item => {
                // remove previous listener to avoid duplicates (but using fresh listener via delegation? safer: use delegation on grid)
                // we will use a global click delegation on galleryGrid to handle both lightbox open.
            });
        }

        // Lightbox state and navigation (full filtered images array index)
        let lightboxActive = false;
        let currentLightboxIndex = -1;       // index inside filteredImages array (global filtered)
        let currentFilteredArray = [];        // holds current filtered images (global snapshot for lightbox)

        function updateLightboxFilteredSnapshot() {
            // take snapshot of currently displayed filtered images (global filter + pagination not relevant: in lightbox we navigate through all filtered images, not just page)
            // better: navigation inside lightbox uses the full filtered dataset (based on active filter), not paginated.
            currentFilteredArray = getFilteredImages();
        }

        function openLightboxById(imageId) {
            updateLightboxFilteredSnapshot();
            const index = currentFilteredArray.findIndex(img => img.id === imageId);
            if (index === -1) return;
            currentLightboxIndex = index;
            showLightboxImage(currentLightboxIndex);
            const modal = document.getElementById("lightboxModal");
            modal.classList.add("active");
            lightboxActive = true;
            document.body.style.overflow = "hidden";
        }

        function showLightboxImage(index) {
            if (!currentFilteredArray.length) return;
            const imgData = currentFilteredArray[index];
            if (!imgData) return;
            const lightboxImg = document.getElementById("lightboxImg");
            const caption = document.getElementById("lightboxCaption");
            lightboxImg.src = imgData.src;
            lightboxImg.alt = imgData.alt;
            caption.innerText = `${imgData.title} — ${imgData.category.toUpperCase()}`;
        }

        function nextLightboxImage() {
            if (!currentFilteredArray.length) return;
            let newIndex = currentLightboxIndex + 1;
            if (newIndex >= currentFilteredArray.length) newIndex = 0;
            currentLightboxIndex = newIndex;
            showLightboxImage(currentLightboxIndex);
        }

        function prevLightboxImage() {
            if (!currentFilteredArray.length) return;
            let newIndex = currentLightboxIndex - 1;
            if (newIndex < 0) newIndex = currentFilteredArray.length - 1;
            currentLightboxIndex = newIndex;
            showLightboxImage(currentLightboxIndex);
        }

        function closeLightbox() {
            const modal = document.getElementById("lightboxModal");
            modal.classList.remove("active");
            lightboxActive = false;
            document.body.style.overflow = "";
        }

        // ---------- Navigation (prev/next page buttons) ----------
        function goPrevPage() {
            if (currentPage > 1) {
                currentPage--;
                renderGallery();
                // rebind any dynamic events (already using event delegation, but safe)
            }
        }

        function goNextPage() {
            const totalPages = getTotalPages();
            if (currentPage < totalPages) {
                currentPage++;
                renderGallery();
            }
        }

        // filter change handler
        function setFilter(category) {
            currentFilter = category;
            currentPage = 1;        // reset to first page on filter change
            clampPage();
            renderGallery();
            // update active button styles
            document.querySelectorAll(".filter-btn").forEach(btn => {
                const btnFilter = btn.getAttribute("data-filter");
                if (btnFilter === currentFilter) {
                    btn.classList.add("active");
                } else {
                    btn.classList.remove("active");
                }
            });
        }

        // ----- global event delegation for clicks (gallery + lightbox controls) -----
        function setupDelegation() {
            const grid = document.getElementById("galleryGrid");
            grid.addEventListener("click", (e) => {
                // find closest gallery-item
                const galleryItem = e.target.closest(".gallery-item");
                if (galleryItem) {
                    const imgId = parseInt(galleryItem.getAttribute("data-id"));
                    if (!isNaN(imgId)) {
                        openLightboxById(imgId);
                    }
                }
            });

            // lightbox controls
            const lbPrev = document.getElementById("lbPrevBtn");
            const lbNext = document.getElementById("lbNextBtn");
            const closeLb = document.getElementById("closeLightboxBtn");
            const modal = document.getElementById("lightboxModal");

            if (lbPrev) lbPrev.addEventListener("click", (e) => { e.stopPropagation(); prevLightboxImage(); });
            if (lbNext) lbNext.addEventListener("click", (e) => { e.stopPropagation(); nextLightboxImage(); });
            if (closeLb) closeLb.addEventListener("click", closeLightbox);
            modal.addEventListener("click", (e) => {
                if (e.target === modal) closeLightbox();
            });

            // keyboard events for lightbox
            document.addEventListener("keydown", (e) => {
                if (!lightboxActive) return;
                if (e.key === "Escape") closeLightbox();
                if (e.key === "ArrowRight") nextLightboxImage();
                if (e.key === "ArrowLeft") prevLightboxImage();
            });
        }

        function setupFilterButtons() {
            const filterBtns = document.querySelectorAll(".filter-btn");
            filterBtns.forEach(btn => {
                btn.addEventListener("click", () => {
                    const filterValue = btn.getAttribute("data-filter");
                    if (filterValue) setFilter(filterValue);
                });
            });
        }

        function setupPaginationButtons() {
            const prevBtn = document.getElementById("prevPageBtn");
            const nextBtn = document.getElementById("nextPageBtn");
            if (prevBtn) prevBtn.addEventListener("click", goPrevPage);
            if (nextBtn) nextBtn.addEventListener("click", goNextPage);
        }

        // initial render and init
        function init() {
            setupFilterButtons();
            setupPaginationButtons();
            setupDelegation();
            renderGallery();          // initial render with all images
            // Additional safety: ensure lightbox snapshot updates on filter changes (already inside openLightboxById, but also if lightbox is not open it's fine)
        }

        init();
    </script>
</body>

</html>
